name: Daily Scrape

on:
  schedule:
    # Daily at 6:00 AM UTC - scrape first 5 pages (recent additions)
    - cron: '0 6 * * *'
    # Weekly full scrape on Sundays at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max pages to scrape'
        required: false
        default: '5'
      max_items:
        description: 'Max items to scrape'
        required: false
        default: '99999'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Determine scrape depth
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "max_pages=${{ inputs.max_pages }}" >> $GITHUB_OUTPUT
            echo "max_items=${{ inputs.max_items }}" >> $GITHUB_OUTPUT
            echo "fresh=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 2 * * 0" ]; then
            echo "max_pages=999" >> $GITHUB_OUTPUT
            echo "max_items=99999" >> $GITHUB_OUTPUT
            echo "fresh=true" >> $GITHUB_OUTPUT
          else
            echo "max_pages=5" >> $GITHUB_OUTPUT
            echo "max_items=99999" >> $GITHUB_OUTPUT
            echo "fresh=false" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper - FitGirl Repacks
        run: |
          FRESH_FLAG=""
          if [ "${{ steps.config.outputs.fresh }}" = "true" ]; then
            FRESH_FLAG="--fresh"
          fi
          python scraper.py "https://fitgirl-repacks.site/" \
            --max-pages ${{ steps.config.outputs.max_pages }} \
            --max-items ${{ steps.config.outputs.max_items }} \
            $FRESH_FLAG \
            -o output/fitgirl-repacks.json

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update scraped data $(date -u +%Y-%m-%d)"
            git push
          fi
